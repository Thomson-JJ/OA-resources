<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osteoarthritis Online Resources</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .header {
            width: 100%;
        }

        .logo-row {
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        .logo {
            height: 60px;
        }

        .divider {
            border-top: 1px solid #ccc;
            margin: 12px 0 18px 0;
            width: 100%;
        }

        .title {
            text-align: center;
            margin: 0 0 20px 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .box {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;   /* makes the box square */
            border: 1px solid #ccc;
            text-decoration: none;
            color: black;
            border-radius: 8px;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            box-sizing: border-box;
        }

        /* Box colors */
        .yellow {
            background-color: #fff9c4;
        }

        .pink {
            background-color: #f8bbd0;
        }

        .blue {
            background-color: #bbdefb;
        }

        .green {
            background-color: #c8e6c9;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: gray;
            text-align: center;
        }

        /* Optional: make it stack on small screens */
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-row">
            <img src="https://covid19.sph.hku.hk/images/hkusph_b.png" alt="HKU SPH Logo" class="logo">
        </div>

        <div class="divider"></div>

        <h1 class="title">Osteoarthritis Online Resources</h1>
    </div>

    <div class="container">
        <a href="https://www.elderly.gov.hk/english/education_and_media_resources/files/ham/Osteoarthritis_of_Knee_Joint_Care_and_Exercise_EN_W3C.pdf" class="box yellow">
            Department of Health
        </a>

        <a href="https://www3.ha.org.hk/ntwc/msc/docs/pep/22_23/%E7%89%A9%E8%86%9D%E8%89%AF%E6%A9%9F%20%E9%81%8B%E5%8B%95%E6%9C%89%E6%B3%95.pdf" class="box pink">
            Hospital Authority
        </a>

        <a href="https://www.labour.gov.hk/eng/public/oh/Knee_06%20Leaflet.pdf" class="box blue">
            Labour Department
        </a>

        <a href="https://www.hkarf.org/rheumatic_diseases/osteoarthritis/" class="box green">
            Hong Kong Arthritis & Rheumatism Foundation
        </a>
    </div>

    <footer>
        Compiled by HKU MBBS Year 4 Students. 2026.
    </footer>
</body>
</html>
