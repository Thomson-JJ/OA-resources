<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osteoarthritis Online Resources</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header Layout */
        .header {
            display: flex;
            flex-direction: column;   /* Stack items vertically */
            padding: 20px;
            margin-bottom: 20px;
        }

        .logo {
            height: 60px;
            align-self: flex-start;   /* Align logo to the left */
            margin-bottom: 10px;      /* Space between logo and line */
        }

        .header-divider {
            width: 100%;
            border-bottom: 1px solid #ccc; /* Horizontal grey line */
            margin-bottom: 15px;           /* Space between line and title */
        }

        h1 {
            text-align: center;       /* Center the title */
            margin: 0;
            font-size: 24px;
        }

        /* Grid Container */
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px auto;
            max-width: 800px;
            padding: 0 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 20px;
            text-decoration: none;
            color: black;
            background-color: #f9f9f9;
            border-radius: 8px;
            transition: background-color 0.2s;
            display: block;
        }

        .box:hover {
            background-color: #e9e9e9;
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            color: gray;
            text-align: center;
            padding-bottom: 20px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://covid19.sph.hku.hk/images/hkusph_b.png" alt="HKU SPH Logo" class="logo">
        <div class="header-divider"></div>
        <h1>Osteoarthritis Online Resources</h1>
    </div>

    <div class="container">
        <a href="https://www.elderly.gov.hk/english/education_and_media_resources/files/ham/Osteoarthritis_of_Knee_Joint_Care_and_Exercise_EN_W3C.pdf" class="box" target="_blank">Department of Health</a>
        <a href="https://www3.ha.org.hk/ntwc/msc/docs/pep/22_23/%E7%89%A9%E8%86%9D%E8%89%AF%E6%A9%9F%20%E9%81%8B%E5%8B%95%E6%9C%89%E6%B3%95.pdf" class="box" target="_blank">Hospital Authority</a>
        <a href="https://www.labour.gov.hk/eng/public/oh/Knee_06%20Leaflet.pdf" class="box" target="_blank">Labour Department</a>
        <a href="https://www.hkarf.org/rheumatic_diseases/osteoarthritis/" class="box" target="_blank">Hong Kong Arthritis & Rheumatism Foundation</a>
    </div>

    <footer>
        Compiled by HKU MBBS Year 4 Students. 2026.
    </footer>
</body>
</html>
