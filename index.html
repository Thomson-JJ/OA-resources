<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osteoarthritis Online Resources</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Header Layout */
        .header {
            display: flex;
            flex-direction: column;
            padding: 20px;
            margin-bottom: 20px;
        }

        .logo {
            height: 60px;
            align-self: flex-start;
            margin-bottom: 10px;
        }

        .header-divider {
            width: 100%;
            border-bottom: 1px solid #ccc;
            margin-bottom: 15px;
        }

        h1 {
            text-align: center;
            margin: 0;
            font-size: 36px; /* Increased from 24px */
            font-weight: 600;
        }

        .hint-text {
            text-align: center;
            font-size: 28px;
            color: #666;
            margin-top: 8px;
            font-style: italic;
        }

        /* Grid Container */
        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px auto;
            max-width: 800px;
            padding: 0 20px;
        }

        /* Box Styling */
        .box {
            aspect-ratio: 2 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            text-decoration: none;
            color: black;
            border-radius: 8px;
            font-size: 32px; /* Increased font size */
            font-weight: 600; /* Slightly bolder */
            cursor: pointer; /* Shows hand cursor */
            transition: all 0.2s ease; /* Smooth animation */
        }

        /* Individual Box Colors */
        .box:nth-child(1) { background-color: #FFF9C4; } /* Light Yellow */
        .box:nth-child(2) { background-color: #FFCDD2; } /* Light Pink */
        .box:nth-child(3) { background-color: #BBDEFB; } /* Light Blue */
        .box:nth-child(4) { background-color: #C8E6C9; } /* Light Green */

        /* Hover Effect - Lift & Shadow */
        .box:hover {
            transform: translateY(-5px); /* Box rises up */
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15); /* Adds shadow */
            filter: brightness(0.95); /* Slightly darker */
        }

        /* Active state (when clicked) */
        .box:active {
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            color: gray;
            text-align: center;
            padding-bottom: 20px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 26px;
            }
            .box {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://covid19.sph.hku.hk/images/hkusph_b.png" alt="HKU SPH Logo" class="logo">
        <div class="header-divider"></div>
        <h1>Osteoarthritis Online Resources</h1>
        <p class="hint-text">Click on a resource below to learn more</p>
    </div>

    <div class="container">
        <a href="https://www.elderly.gov.hk/english/education_and_media_resources/files/ham/Osteoarthritis_of_Knee_Joint_Care_and_Exercise_EN_W3C.pdf" class="box" target="_blank">Department of Health</a>
        <a href="https://www3.ha.org.hk/ntwc/msc/docs/pep/22_23/%E7%89%A9%E8%86%9D%E8%89%AF%E6%A9%9F%20%E9%81%8B%E5%8B%95%E6%9C%89%E6%B3%95.pdf" class="box" target="_blank">Hospital Authority</a>
        <a href="https://www.labour.gov.hk/eng/public/oh/Knee_06%20Leaflet.pdf" class="box" target="_blank">Labour Department</a>
        <a href="https://www.hkarf.org/rheumatic_diseases/osteoarthritis/" class="box" target="_blank">Hong Kong Arthritis & Rheumatism Foundation</a>
    </div>

    <footer>
        Compiled by HKU MBBS Year 4 Students. 2026.
    </footer>
</body>
</html>
